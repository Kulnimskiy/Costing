{% extends "layout.html" %}

{% block title %} Login {% endblock %}

{% block body %}
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg p-4 rounded" style="max-width: 400px; width: 100%;">
        <div class="text-center mb-3">
            <img src="/static/images/login_pic.gif" alt="Login" class="img-fluid" style="max-height: 120px;">
        </div>
        <form action="/login" method="post">
            <div class="mb-3">
                <input name="login" type="text" class="form-control form-control-lg" placeholder="Username" required>
            </div>
            <div class="mb-3">
                <input name="password" type="password" class="form-control form-control-lg" placeholder="Password" required>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" value="remember" id="flexCheckDefault" name="remember">
                <label class="form-check-label" for="flexCheckDefault">
                    Remember Me
                </label>
            </div>
            {% if error %}
                <div class="alert alert-danger" role="alert">{{ error }}</div>
            {% endif %}
            <button class="btn btn-success w-100 btn-lg" type="submit">Log In</button>
        </form>
        <div class="mt-3 text-center">
            <a href="/forgot-password">Forgot password?</a>
        </div>
    </div>
</div>
{% endblock %}
