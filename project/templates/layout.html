<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/static/images/logo.png">
    <title>Costing: {% block title %} {% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <!-- Select2 CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css"
          integrity="sha512-nMNlpuaDPrqlEls3IX/Q56H36qvBASwb3ipuo3MxeWbsQB1881ox0cRv7UPTgBlriqoynt35KjEwgGUeUXIPnw=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-md navbar-light bg-white shadow-sm sticky-top mb-4">
    <div class="container-md">
        <a class="navbar-brand fw-bold" href="/">Costing</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            {% if current_user._id %}
            <ul class="navbar-nav me-auto mb-2 mb-md-0">
                <li class="nav-item"><a class="nav-link" href="/profile">Profile</a></li>
                <li class="nav-item"><a class="nav-link" href="/comparison">Comparison</a></li>
                <li class="nav-item"><a class="nav-link" href="/company-goods">Tracked Goods</a></li>
                <li class="nav-item"><a class="nav-link" href="/competitor-monitoring">Competitors</a></li>
                <li class="nav-item"><a class="nav-link text-danger" href="/logout">Log out</a></li>
            </ul>
            <form class="d-flex" role="search" action="/price-looker" method="get">
                <input class="form-control me-2" type="search" placeholder="Search" name="item-search-field">
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
            {% else %}
            <ul class="navbar-nav ms-auto mb-2 mb-md-0">
                <li class="nav-item"><a class="nav-link" href="/login">Login</a></li>
                <li class="nav-item"><a class="nav-link btn btn-outline-success fw-bold ms-2" href="/signup">Sign Up</a></li>
            </ul>
            {% endif %}
        </div>
    </div>
</nav>

<!-- Main content -->
<main class="flex-grow-1">
    <div class="container-md">
        {% block body %}{% endblock %}
    </div>
</main>

<!-- Footer -->
<footer class="bg-white shadow-sm mt-auto py-4">
    <div class="container-md d-flex flex-column flex-md-row justify-content-between align-items-center">
        <div class="d-flex align-items-center mb-3 mb-md-0">
            <img src="/static/images/logo.png" alt="logo" width="30" class="me-2">
            <span class="text-muted">© 2024 Costing, Inc</span>
        </div>
        <ul class="nav list-unstyled d-flex">
            <li class="ms-3"><a href="#" class="text-muted"><img src="/static/images/insta.png" alt="Instagram" width="26"></a></li>
            <li class="ms-3"><a href="#" class="text-muted"><img src="/static/images/facebook.png" alt="Facebook" width="26"></a></li>
            <li class="ms-3"><a href="#" class="text-muted"><img src="/static/images/twitter.png" alt="Twitter" width="26"></a></li>
        </ul>
    </div>
</footer>

<!-- Scripts -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.full.min.js" crossorigin="anonymous"></script>
</body>
</html>
